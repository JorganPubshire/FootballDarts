# https://github.com/astral-sh/ruff-pre-commit — keeps Ruff in sync with [tool.ruff] in pyproject.toml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]
